name: Swift

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-macos:
    name: macOS build + test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-reg-${{ runner.os }}-${{ hashFiles('Scripts/**') }}
          restore-keys: cargo-reg-${{ runner.os }}-

      - name: Checkout Turso engine
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/BoutiqueDB
          path: engine

      - name: Cache engine target
        uses: actions/cache@v4
        with:
          path: engine/target
          key: turso-sdk-multi-${{ runner.os }}-${{ hashFiles('Scripts/build-turso-sdk*.sh') }}
          restore-keys: turso-sdk-multi-${{ runner.os }}-

      - name: Build multi-arch TursoSDK.xcframework
        run: |
          chmod +x Scripts/build-turso-sdk-xcframework.sh
          export PATH="$HOME/.cargo/bin:$PATH"
          SLICES=all TURSO_SRC="${{ github.workspace }}/engine" ./Scripts/build-turso-sdk-xcframework.sh
          find Vendor/TursoSDK.xcframework -name '*.a' -exec lipo -info {} \;
          find Vendor/TursoSDK.xcframework -type d -name 'ios-arm64' | grep -q .
          find Vendor/TursoSDK.xcframework -type d -name 'macos-*' | grep -q .
          find Vendor/TursoSDK.xcframework -type d -name 'ios-*-simulator' | grep -q .

      - name: Build (macOS)
        run: swift build

      - name: Test (macOS)
        run: swift test

  build-ios:
    name: iOS Simulator build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Checkout Turso engine
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/BoutiqueDB
          path: engine

      - name: Cache engine target
        uses: actions/cache@v4
        with:
          path: engine/target
          key: turso-sdk-multi-${{ runner.os }}-${{ hashFiles('Scripts/build-turso-sdk*.sh') }}
          restore-keys: turso-sdk-multi-${{ runner.os }}-

      - name: Build multi-arch TursoSDK.xcframework
        run: |
          chmod +x Scripts/build-turso-sdk-xcframework.sh
          export PATH="$HOME/.cargo/bin:$PATH"
          SLICES=all TURSO_SRC="${{ github.workspace }}/engine" ./Scripts/build-turso-sdk-xcframework.sh

      - name: Resolve package
        run: swift package resolve

      - name: Build for iOS Simulator
        run: |
          set -euo pipefail
          # Apple Silicon runners: arm64 simulator. Proves native iOS slice links.
          xcodebuild -scheme BoutiqueDB-Package \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath .build/DerivedData-ios \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64 \
            build
