name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Multi-arch xcframework + GitHub Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/BoutiqueDB
          path: engine

      - name: Build full multi-arch TursoSDK
        env:
          TURSO_SRC: ${{ github.workspace }}/engine
        run: |
          chmod +x Scripts/build-turso-sdk-xcframework.sh
          test -d engine/sdk-kit
          SLICES=all TURSO_SRC="$TURSO_SRC" ./Scripts/build-turso-sdk-xcframework.sh
          find Vendor/TursoSDK.xcframework -name '*.a' -exec lipo -info {} \;
          find Vendor/TursoSDK.xcframework -type d -name 'ios-arm64' | grep -q .
          find Vendor/TursoSDK.xcframework -type d -name 'macos-*' | head -1 | grep -q .

      - name: Checksum
        id: sum
        run: |
          SUM=$(swift package compute-checksum Vendor/TursoSDK.xcframework.zip)
          echo "checksum=$SUM" >> "$GITHUB_OUTPUT"
          echo "Checksum: $SUM"
          ls -lh Vendor/TursoSDK.xcframework.zip
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          grep -Fq "let tursoSDKVersion = \"$TAG_VERSION\"" Package.swift
          grep -Fq "let tursoSDKChecksum = \"$SUM\"" Package.swift

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Vendor/TursoSDK.xcframework.zip
          body: |
            BoutiqueDB `${{ github.ref_name }}`

            Multi-arch engine binary (macOS + iOS device + iOS Simulator):
            - Asset: `TursoSDK.xcframework.zip`
            - Checksum: `${{ steps.sum.outputs.checksum }}`

            Install:
            ```swift
            .package(url: "https://github.com/${{ github.repository }}.git", from: "${{ steps.sum.outputs.version }}")
            ```

            Platforms: iOS 17+, macOS 14+. No `unsafeFlags`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
