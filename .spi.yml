# Swift Package Index — https://github.com/SwiftPackageIndex/SPIManifest
# Full platform set: macOS + iOS (requires multi-arch TursoSDK.xcframework).
version: 1
builder:
  configs:
    - platform: macos-xcodebuild
      scheme: BoutiqueDB-Package
      documentation_targets:
        - BoutiqueDB
        - TursoKit
    - platform: ios
      scheme: BoutiqueDB-Package
      documentation_targets:
        - BoutiqueDB
        - TursoKit
